<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Learning App</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
<nav class="bg-white shadow-md">
<div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
<h1 class="text-2xl font-bold text-blue-600">📚 WordMaster</h1>
<ul class="hidden md:flex gap-6 text-gray-700">
<li><a href="#">首页</a></li>
<li><a href="#">录入单词</a></li>
<li><a href="#">学习卡片</a></li>
</ul>
</div>
</nav>

<section class="max-w-7xl mx-auto px-4 py-12">
<div class="bg-gradient-to-r from-blue-500 to-indigo-600 text-white rounded-2xl p-8 md:p-12">
<h2 class="text-3xl md:text-5xl font-bold mb-4">开始你的英语单词学习之旅</h2>
<p class="text-lg opacity-90 mb-6">添加单词、制作学习卡片、随时随地记忆英语词汇。</p>
<button class="bg-white text-blue-600 px-6 py-3 rounded-lg font-semibold">开始学习</button>
</div>
</section>

<main class="max-w-7xl mx-auto px-4 pb-12">
<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

<section class="lg:col-span-1">
<div class="bg-white rounded-xl shadow p-6">
<h3 class="text-xl font-bold mb-4">➕ 添加新单词</h3>
<form id="add-word-form" class="space-y-4">
<input id="word-input" type="text" placeholder="英文单词" class="w-full border rounded-lg px-4 py-2">
<input id="def-input" type="text" placeholder="中文释义" class="w-full border rounded-lg px-4 py-2">
<textarea id="example-input" rows="3" placeholder="输入例句..." class="w-full border rounded-lg px-4 py-2"></textarea>
<button class="w-full bg-blue-600 text-white py-3 rounded-lg">保存单词</button>
</form>
</div>
</section>

<section class="lg:col-span-2">
<h3 class="text-2xl font-bold mb-4">🧠 学习卡片</h3>

<div class="mb-6 flex gap-3 items-center">
	<input id="search-input" type="text" placeholder="搜索单词" class="border rounded-lg px-4 py-2 w-72">
	<button id="search-button" class="bg-blue-600 text-white px-4 py-2 rounded-lg">查询</button>
	<div id="search-results" class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-6"></div>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<div class="bg-white rounded-xl shadow-lg p-6">
<div class="text-center">
<h4 class="text-3xl font-bold text-blue-600 mb-3">Apple</h4>
<p class="text-gray-600 mb-4">苹果</p>
<div class="bg-gray-100 rounded-lg p-3">I eat an apple every day.</div>
</div>
</div>

<div class="bg-white rounded-xl shadow-lg p-6">
<div class="text-center">
<h4 class="text-3xl font-bold text-blue-600 mb-3">Success</h4>
<p class="text-gray-600 mb-4">成功</p>
<div class="bg-gray-100 rounded-lg p-3">Success comes from hard work.</div>
</div>
</div>

</div>
</section>

</div>
</main>

<script type="module" src="./assets/js/app.js"></script>
</body>
</html>
